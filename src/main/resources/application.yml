config_ordinal: 500
quarkus:
  http:
    http2: true
    root-path: /api/v1
    port: 9905
    io-threads: 1                      # Match event-loops-pool-size (800m CPU pod)
    limits:
      max-body-size: 10M
      max-connections: 300             # 200 TPS/pod with some headroom
  # =========================
  # Database Configuration
  # 7 pods x 200 TPS = 1400 TPS total
  # =========================
  datasource:
    db-kind: oracle
    username: CYA_AAA_OPS
    password: UkkaNk8KnAPp19!
    reactive:
      url: oracle:thin:@172.24.0.203:1908/AAA
  # =========================
  # Vert.x Configuration
  # 7 pods x 800m CPU / 1.2Gi, 200 TPS/pod
  # =========================
  vertx:
    event-loops-pool-size: 1           # 800m CPU → 1 event loop sufficient
    internal-blocking-pool-size: 4     # concurrency(2) + 2 headroom for blocking ops
    warning-exception-time: 10s
    max-event-loop-execute-time: 5s
    max-worker-execute-time: 60s
    prefer-native-transport: true
    caching: false
  thread-pool:
    core-threads: 4                    # 2 consumers + 2 for HTTP/scheduled ops
    max-threads: 8                     # Minimal burst - avoids context switching on 800m CPU
    queue-size: 250
    growth-resistance: 0
    shutdown-timeout: 30s
  # =========================
  # Logging
  # =========================
  log:
    level: INFO
    console:
      format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
      async:
        queue-length: 8192
        overflow: discard
      enabled: false
    file:
      enabled: true
      level: INFO
      path: "/var/log/dte/${HOSTNAME:unknown}.log"
      format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
      async:
        enable: true
        queue-length: 16384
        overflow: discard
      rotation:
        max-file-size: 60M
        max-backup-index: 10
        rotate-on-boot: true
    category:
      "org.apache.kafka":
        level: ERROR
      "io.smallrye.reactive.messaging.kafka":
        level: ERROR
      "io.quarkus.config":
        level: ERROR
      "io.smallrye.config":
        level: ERROR
      "com.csg.airtel.aaa4j":
        level: INFO
  # =========================
  # OpenTelemetry
  # =========================
  otel:
    traces:
      exporter: none
  # =========================
  # Micrometer Metrics
  # =========================
  micrometer:
    enabled: true
    binder-enabled-default: false
    binder:
      jvm:
        enabled: true
      system:
        enabled: true
      http-server:
        enabled: true
      vertx:
        enabled: true
    export:
      prometheus:
        enabled: true
        path: /q/metrics
    vertx:
      enabled: true
      metrics:
        options:
          enabled: true
          registry-name: micrometer
  # =========================
  # Redis (Sentinel)
  # 200 TPS x ~2ms avg = ~0.4 concurrent, 2-3 calls/req = ~1.2 concurrent + headroom
  # =========================
  redis:
    client-type: sentinel
    hosts: redis://redis-cluster-headless.csg-aaa-query-cache.svc.cluster.local:26379
    master-name: mymaster
    role: master
    password: S3cure_Redis_Pass_w0rd!
    max-pool-size: 6                   # 200 TPS × ~3 Redis calls × 2ms = ~1.2 concurrent + headroom
    max-waiting-handlers: 128
    max-pool-waiting: 64
    pool-recycle-timeout: 180000
    reconnect-attempts: 3
    reconnect-interval: 500
    pool-cleaner-interval: 20000
    timeout: 3000
# =========================
# CoA HTTP Client
# =========================
coa:
  nas:
    host: airtel-aaa-radius-server-service.csg-aaa-app.svc.cluster.local
    port: 8080
webclient:
  max-pool-size: 16                    # 200 TPS/pod HTTP/1.1
  connect-timeout: 5000
  idle-timeout: 30000
  keep-alive: true
  pipelining: true
  pipelining-limit: 10
  http2-max-pool-size: 16             # 200 TPS/pod HTTP/2
  http2-multiplexing-limit: 100
  http2-keep-alive-timeout: 60
# =========================
# DB Connection Pool
# 200 TPS × ~5ms avg query × ~2 queries/req = ~2 concurrent + headroom
# 7 pods × 6 = 42 total DB connections
# =========================
pool:
  max-size: 6                          # 200 TPS × 10ms total DB time = ~2 concurrent + headroom
  connection-timeout: 5000
  idle-timeout: 600000
  max-lifetime: 1800000
  acquire-increment: 2
  prepared-statement-cache-max-size: 256
  pipelining-enabled: true
  pipelining-limit: 256
  event-loop-size: 1                   # Match vertx event-loops-pool-size
  tcp-keep-alive: true
  tcp-no-delay: true
  pool-cleaner-enabled: true
  pool-cleaner-interval: 60000
# =========================
# Idle Session Cleanup
# =========================
idle-session:
  enabled: false
  timeout-minutes: 60
  scheduler-interval: 60000m
  batch-size: 1000
# =========================
# Kafka
# 7 pods × 200 TPS = 1400 TPS total
# 14 partitions / 7 pods = 2 partitions per pod → concurrency: 2
# =========================
kafka:
  bootstrap:
    servers: kafka-headless.csg-aaa-query-cache.svc.cluster.local:9092
mp:
  messaging:
    outgoing:
      db-write-events:
        connector: smallrye-kafka
        topic: dctodr-dc
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        acks: all
        retries: 3
        retry.backoff.ms: 500
        max.in.flight.requests.per.connection: 5
        compression.type: lz4
        batch.size: 32768
        linger.ms: 10
        buffer.memory: 16777216
        metadata.max.age.ms: 30000
        request.timeout.ms: 30000
        delivery.timeout.ms: 120000
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 5000
        enable.idempotence: true
      accounting-resp-events:
        connector: smallrye-kafka
        topic: accounting-response-dc
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        acks: all
        retries: 3
        retry.backoff.ms: 500
        max.in.flight.requests.per.connection: 5
        compression.type: lz4
        batch.size: 32768
        linger.ms: 10
        buffer.memory: 16777216        # 16MB (was 32MB - saves memory on 1.2Gi pod)
        metadata.max.age.ms: 30000
        request.timeout.ms: 30000
        delivery.timeout.ms: 120000
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 5000
        enable.idempotence: true
      accounting-cdr-events:
        connector: smallrye-kafka
        topic: cdr-event-dc
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        acks: all
        retries: 3
        retry.backoff.ms: 500
        max.in.flight.requests.per.connection: 5
        compression.type: lz4
        batch.size: 16384
        linger.ms: 5
        buffer.memory: 16777216
        metadata.max.age.ms: 30000
        request.timeout.ms: 30000
        delivery.timeout.ms: 120000
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 5000
        enable.idempotence: true
      quota-notification-events:
        connector: smallrye-kafka
        topic: quota-notifications-dc
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
        acks: all
        retries: 3
        retry.backoff.ms: 500
        max.in.flight.requests.per.connection: 5
        compression.type: lz4
        batch.size: 32768
        linger.ms: 10
        buffer.memory: 16777216        # 16MB (was 32MB - saves memory on 1.2Gi pod)
        metadata.max.age.ms: 30000
        request.timeout.ms: 30000
        delivery.timeout.ms: 120000
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 5000
        enable.idempotence: true
    incoming:
      accounting-events:
        connector: smallrye-kafka
        topic: accounting-dc-2
        group.id: accounting-consumer-group
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
        auto.offset.reset: earliest
        enable.auto.commit: false
        max.poll.records: 200          # 200 TPS / 2 polls per sec = ~100 records/poll, 200 with headroom
        max.poll.interval.ms: 120000   # 2 min - generous for 200 records on 800m CPU
        poll-timeout: 1000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        fetch.min.bytes: 1
        fetch.max.bytes: 10485760
        max.partition.fetch.bytes: 1048576
        receive.buffer.bytes: 65336
        connections.max.idle.ms: 540000
        failure-strategy: ignore
        concurrency: 2                 # 14 partitions / 7 pods = 2 per pod (exact match)
