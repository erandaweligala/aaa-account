apiVersion: v1
kind: ConfigMap
metadata:
  name: airtel-aaa-accounting-mgt-configmap
  namespace: csg-aaa-app
data:
  application.yml: |-
    config_ordinal: 500
    quarkus:
      http:
        http2: true
        root-path: /api/v1
        port: 9905
      # =========================
      # Database Configuration
      # HIGH TPS – ~2500 TPS (7 pods)
      # =========================
      datasource:
        db-kind: oracle
        username: CYA_AAA_OPS
        password: UkkaNk8KnAPp19!
        reactive:
          url: oracle:thin:@172.24.0.203:1908/AAA
      # =========================
      # Vert.x Configuration
      # Optimized for 1-core pod (~360 TPS/pod)
      # =========================
      vertx:
        event-loops-pool-size: 2           # 2 event loops for 1-core pod (Kafka I/O + Redis/HTTP I/O)
        internal-blocking-pool-size: 16    # Match consumer concurrency (16)
        warning-exception-time: 10s
        max-event-loop-execute-time: 5s
        max-worker-execute-time: 60s
        prefer-native-transport: true
        caching: false
      thread-pool:
        core-threads: 16                   # Match consumer concurrency + headroom
        max-threads: 32                    # Burst capacity without excessive context switching on 1 core
        queue-size: 1000                   # Backpressure-aware consumer prevents unbounded buildup
        growth-resistance: 0
        shutdown-timeout: 30s
      # =========================
      # Logging
      # =========================
      log:
        level: INFO
        console:
          format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
          async:
            queue-length: 8192
            overflow: discard
          enabled: false
        file:
          enabled: true
          level: INFO
          path: "/var/log/dte/${HOSTNAME:unknown}.log"
          format: "[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %-5p [%c][%t][%X{traceId}][%X{userName}][%X{sessionId}] %s%e%n"
          async:
            enable: true
            queue-length: 8192
            overflow: discard
          rotation:
            max-file-size: 60M
            max-backup-index: 10
            rotate-on-boot: true
        category:
          "org.apache.kafka":
            level: ERROR
          "io.smallrye.reactive.messaging.kafka":
            level: ERROR
          "io.quarkus.config":
            level: ERROR
          "io.smallrye.config":
            level: ERROR
          "com.csg.airtel.aaa4j":
            level: INFO
      # =========================
      # OpenTelemetry
      # =========================
      otel:
        traces:
          exporter: none
      # =========================
      # Micrometer Metrics
      # =========================
      micrometer:
        enabled: true
        binder-enabled-default: false
        binder:
          jvm:
            enabled: true
          system:
            enabled: true
          http-server:
            enabled: true
          vertx:
            enabled: true
        export:
          prometheus:
            enabled: true
            path: /q/metrics
        vertx:
          enabled: true
          metrics:
            options:
              enabled: true
              registry-name: micrometer
      # =========================
      # Redis (Sentinel)
      # =========================
      redis:
        client-type: sentinel
        hosts: redis://redis-cluster-headless.csg-aaa-query-cache.svc.cluster.local:26379
        master-name: mymaster
        role: master
        password: S3cure_Redis_Pass_w0rd!
        max-pool-size: 48                  # Sized for concurrency 16: ~32 concurrent Redis ops + headroom
        max-waiting-handlers: 512
        max-pool-waiting: 256
        pool-recycle-timeout: 240000
        reconnect-attempts: 3
        reconnect-interval: 500
        pool-cleaner-interval: 20000
        timeout: 3000
    # =========================
    # CoA HTTP Client
    # =========================
    coa:
      nas:
        host: airtel-aaa-radius-server-service.csg-aaa-app.svc.cluster.local
        port: 8080
    webclient:
      max-pool-size: 20
      connect-timeout: 5000
      idle-timeout: 60000
      keep-alive: true
      pipelining: true
      pipelining-limit: 10
      http2-max-pool-size: 20
      http2-multiplexing-limit: 100
      http2-keep-alive-timeout: 60
    # =========================
    # DB Connection Pool
    # Per pod: 25 connections x 7 pods = 175 total
    # =========================
    pool:
      max-size: 25                         # Increased from 12 to prevent DB connection bottleneck
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      acquire-increment: 4
      prepared-statement-cache-max-size: 256
      pipelining-enabled: true
      pipelining-limit: 256
      event-loop-size: 2                   # Match vertx event-loops-pool-size
      tcp-keep-alive: true
      tcp-no-delay: true
      pool-cleaner-enabled: true
      pool-cleaner-interval: 60000
    # =========================
    # Idle Session Cleanup
    # =========================
    idle-session:
      enabled: false
      timeout-minutes: 60
      scheduler-interval: 60000m
      batch-size: 1000
    # =========================
    # Kafka
    # =========================
    kafka:
      bootstrap:
        servers: kafka-headless.csg-aaa-query-cache.svc.cluster.local:9092
    mp:
      messaging:
        outgoing:
          db-write-events:
            connector: smallrye-kafka
            topic: dctodr-dc
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
            acks: all
            retries: 5
            retry.backoff.ms: 500
            max.in.flight.requests.per.connection: 5
            compression.type: lz4
            batch.size: 32768
            linger.ms: 10
            buffer.memory: 16777216
            metadata.max.age.ms: 30000
            request.timeout.ms: 30000
            delivery.timeout.ms: 120000
            reconnect.backoff.ms: 1000
            reconnect.backoff.max.ms: 5000
            enable.idempotence: true
          accounting-resp-events:
            connector: smallrye-kafka
            topic: accounting-response-dc
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
            acks: all
            retries: 3
            retry.backoff.ms: 500
            max.in.flight.requests.per.connection: 5
            compression.type: lz4
            batch.size: 32768
            linger.ms: 10
            buffer.memory: 16777216
            metadata.max.age.ms: 30000
            request.timeout.ms: 30000
            delivery.timeout.ms: 120000
            reconnect.backoff.ms: 1000
            reconnect.backoff.max.ms: 5000
            enable.idempotence: true
          accounting-cdr-events:
            connector: smallrye-kafka
            topic: cdr-event-dc
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
            acks: all
            retries: 3
            retry.backoff.ms: 500
            max.in.flight.requests.per.connection: 5
            compression.type: lz4
            batch.size: 16384
            linger.ms: 5
            buffer.memory: 16777216
            metadata.max.age.ms: 30000
            request.timeout.ms: 30000
            delivery.timeout.ms: 120000
            reconnect.backoff.ms: 1000
            reconnect.backoff.max.ms: 5000
            enable.idempotence: true
          quota-notification-events:
            connector: smallrye-kafka
            topic: quota-notifications-dc
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
            acks: all
            retries: 3
            retry.backoff.ms: 500
            max.in.flight.requests.per.connection: 5
            compression.type: lz4
            batch.size: 32768
            linger.ms: 10
            buffer.memory: 16777216
            metadata.max.age.ms: 30000
            request.timeout.ms: 30000
            delivery.timeout.ms: 120000
            reconnect.backoff.ms: 1000
            reconnect.backoff.max.ms: 5000
            enable.idempotence: true
        incoming:
          accounting-events:
            connector: smallrye-kafka
            topic: accounting-dc-2
            group.id: accounting-consumer-group
            key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value.deserializer: io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
            auto.offset.reset: earliest
            enable.auto.commit: false
            max.poll.records: 500            # Increased from 200 for better throughput
            max.poll.interval.ms: 300000
            poll-timeout: 1000
            session.timeout.ms: 30000
            heartbeat.interval.ms: 10000
            fetch.min.bytes: 1
            fetch.max.bytes: 52428800
            max.partition.fetch.bytes: 5242880
            receive.buffer.bytes: 131072
            connections.max.idle.ms: 540000
            failure-strategy: ignore
            concurrency: 16                 # CRITICAL: Increased from 2 to 16 for proper throughput
